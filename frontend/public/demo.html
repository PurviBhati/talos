<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donezo Chromatic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Light Theme Palette (Mints & Creams)
                        'lt-bg': '#F0F5F3',
                        'lt-card': '#FFFFFF',
                        'lt-accent': '#114232',
                        // Dark Theme Palette (Deep Forest & Moss)
                        'dk-bg': '#0D2B22',
                        'dk-card': '#163D32',
                        'dk-accent': '#34D399',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { border-radius: 24px; transition: all 0.4s ease; border: 1px solid transparent; }
        
        /* Light Theme Font Styling */
        .light-text { color: #114232; font-weight: 500; }
        
        /* Dark Theme Font Styling - Slightly lighter weight to prevent "glowing" blur */
        .dark .dark-text { color: #ECFDF5; font-weight: 400; letter-spacing: 0.01em; }
        
        .theme-transition { transition: background-color 0.5s, color 0.5s, border-color 0.5s; }
    </style>
</head>
<body class="bg-lt-bg dark:bg-dk-bg theme-transition flex h-screen overflow-hidden">

    <aside class="w-64 bg-white dark:bg-dk-card border-r border-emerald-100 dark:border-emerald-900/50 flex flex-col p-8 space-y-10">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 rounded-full bg-lt-accent dark:bg-dk-accent flex items-center justify-center">
                <div class="w-3 h-3 bg-white dark:bg-dk-bg rounded-full"></div>
            </div>
            <span class="text-xl font-bold text-lt-accent dark:text-emerald-50">Donezo</span>
        </div>
        
        <nav class="flex-1 space-y-2">
            <a href="#" class="flex items-center space-x-3 bg-emerald-100/50 dark:bg-emerald-500/10 p-3 rounded-xl text-lt-accent dark:text-dk-accent font-bold">
                Dashboard
            </a>
            <a href="#" class="flex items-center p-3 text-emerald-800/50 dark:text-emerald-100/40 hover:text-lt-accent dark:hover:text-dk-accent">Tasks</a>
            <a href="#" class="flex items-center p-3 text-emerald-800/50 dark:text-emerald-100/40">Calendar</a>
        </nav>

        <button onclick="document.documentElement.classList.toggle('dark')" 
                class="w-full py-3 rounded-2xl bg-lt-accent dark:bg-dk-accent text-white dark:text-dk-bg font-bold shadow-lg transform active:scale-95 transition-all">
            Switch Tone
        </button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-lt-accent dark:text-emerald-50">Dashboard</h1>
                <p class="text-sm text-emerald-700/60 dark:text-emerald-100/50">Chromatic contrast active.</p>
            </div>
            
            <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-3 bg-white dark:bg-dk-card p-2 pr-6 rounded-full border border-emerald-100 dark:border-emerald-800">
                    <img src="https://i.pravatar.cc/150?u=2" class="w-10 h-10 rounded-full">
                    <span class="text-sm font-bold text-lt-accent dark:text-emerald-50">Totok Michael</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-6">
            
            <div class="col-span-4 card bg-lt-accent dark:bg-emerald-500 p-8 text-white dark:text-dk-bg shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-xs uppercase tracking-widest opacity-80 font-bold">Total Projects</p>
                    <p class="text-5xl font-bold my-4">24</p>
                    <p class="text-xs">+12% from last month</p>
                </div>
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-white/10 rounded-full blur-2xl"></div>
            </div>

            <div class="col-span-4 card bg-white dark:bg-dk-card p-8 shadow-sm border border-emerald-100 dark:border-emerald-800/50">
                <p class="text-xs uppercase tracking-widest text-emerald-700/50 dark:text-emerald-100/30 font-bold">Running Projects</p>
                <p class="text-5xl font-bold my-4 text-lt-accent dark:text-emerald-50">12</p>
                <div class="flex items-center text-emerald-500 dark:text-dk-accent text-sm font-bold">
                    <span class="mr-2">●</span> Active Now
                </div>
            </div>

            <div class="col-span-4 card bg-emerald-50 dark:bg-[#1B4D3E] p-8 border border-emerald-100 dark:border-emerald-800/50">
                <h3 class="font-bold text-lt-accent dark:text-emerald-50 mb-4">Project Progress</h3>
                <div class="w-full bg-emerald-200 dark:bg-emerald-900 rounded-full h-4 mb-4">
                    <div class="bg-lt-accent dark:bg-dk-accent h-4 rounded-full" style="width: 41%"></div>
                </div>
                <p class="text-2xl font-bold text-lt-accent dark:text-emerald-50">41%</p>
            </div>

            <div class="col-span-8 card bg-white dark:bg-dk-card p-8 border border-emerald-100 dark:border-emerald-800/50">
                <h3 class="font-bold text-lt-accent dark:text-emerald-50 mb-6">Team Collaboration</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-lt-bg dark:bg-dk-bg/50">
                        <div class="flex items-center space-x-4">
                            <img src="https://i.pravatar.cc/40?u=1" class="w-10 h-10 rounded-full">
                            <span class="font-bold text-lt-accent dark:text-emerald-50">Alexandra Deff</span>
                        </div>
                        <span class="px-4 py-1 rounded-full bg-emerald-200/50 dark:bg-emerald-500/20 text-emerald-800 dark:text-dk-accent text-xs font-bold">Completed</span>
                    </div>
                </div>
            </div>

            <div class="col-span-4 card bg-[#114232] dark:bg-dk-accent p-8 text-white dark:text-dk-bg shadow-lg flex flex-col justify-center items-center text-center">
                <p class="text-xs uppercase opacity-70 mb-2">Current Session</p>
                <p class="text-4xl font-mono font-bold tracking-tighter">01:24:08</p>
            </div>

        </div>
    </main>

</body>
</html>
