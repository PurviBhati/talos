<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SchemaFlow AI – AEO & Structured Data Manager for Webflow</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0D1117; --surface: #161B22; --card: #1C2333; --border: #30363D;
  --border-h: #484F58; --accent: #2DD4BF; --accent-dim: rgba(45,212,191,.12);
  --accent-h: #5EEAD4; --text1: #E6EDF3; --text2: #8B949E; --text3: #484F58;
  --ok: #3FB950; --ok-d: rgba(63,185,80,.12); --warn: #D29922; --warn-d: rgba(210,153,34,.12);
  --err: #F85149; --err-d: rgba(248,81,73,.12); --blue: #58A6FF; --blue-d: rgba(88,166,255,.12);
  --ui: 'Plus Jakarta Sans', sans-serif; --code: 'JetBrains Mono', monospace;
  --r1: 6px; --r2: 10px; --r3: 14px; --sw: 288px;
}
body { font-family: var(--ui); background: var(--bg); color: var(--text1); height: 100vh; overflow: hidden; font-size: 14px; line-height: 1.5; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-h); }

.app { display: flex; flex-direction: column; height: 100vh; }
.hdr { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 54px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.bdy { display: flex; flex: 1; overflow: hidden; }
.sbar { width: var(--sw); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.logo { display: flex; align-items: center; gap: 9px; }
.logo-ic { width: 30px; height: 30px; background: var(--accent-dim); border: 1px solid var(--accent); border-radius: var(--r1); display: flex; align-items: center; justify-content: center; color: var(--accent); font-family: var(--code); font-size: 12px; font-weight: 500; }
.logo-tx { font-weight: 700; font-size: 15px; }
.logo-tx span { color: var(--accent); }

.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.bdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.b-ok { background: var(--ok-d); color: var(--ok); border: 1px solid var(--ok); }
.b-no { background: var(--err-d); color: var(--err); border: 1px solid var(--err); }
.b-dm { background: var(--blue-d); color: var(--blue); border: 1px solid var(--blue); }

.sec { border-bottom: 1px solid var(--border); padding: 14px 16px; }
.sec:last-child { border-bottom: none; flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
.sec-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 10px; }

.inp { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r1); color: var(--text1); padding: 7px 10px; font-size: 12px; font-family: var(--ui); outline: none; transition: border-color .15s; }
.inp:focus { border-color: var(--accent); }
.inp::placeholder { color: var(--text3); }
.inp-c { font-family: var(--code) !important; }
.inp-g { margin-bottom: 9px; }
.inp-lbl { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 13px; border-radius: var(--r1); font-size: 12px; font-weight: 600; font-family: var(--ui); cursor: pointer; border: 1px solid transparent; transition: all .15s; white-space: nowrap; }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-p { background: var(--accent); color: #0D1117; border-color: var(--accent); }
.btn-p:hover:not(:disabled) { background: var(--accent-h); }
.btn-o { background: transparent; color: var(--text1); border-color: var(--border); }
.btn-o:hover:not(:disabled) { border-color: var(--border-h); background: var(--card); }
.btn-s { background: var(--ok-d); color: var(--ok); border-color: var(--ok); }
.btn-w { width: 100%; }
.btn-sm { padding: 5px 10px; font-size: 11px; }

.ls { overflow-y: auto; flex: 1; min-height: 0; padding-bottom: 4px; }
.li { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--r1); cursor: pointer; transition: background .1s; font-size: 13px; }
.li:hover { background: var(--card); }
.li.act { background: var(--accent-dim); color: var(--accent); }
.li-ic { font-size: 13px; flex-shrink: 0; }
.slug { font-size: 10px; color: var(--text3); font-family: var(--code); margin-top: 1px; }
.tag { font-size: 10px; padding: 1px 5px; border-radius: 4px; font-weight: 600; line-height: 1.4; }
.tag-draft { background: var(--warn-d); color: var(--warn); }
.tag-ok { background: var(--ok-d); color: var(--ok); }
.tag-blue { background: var(--blue-d); color: var(--blue); }

.sw { position: relative; margin-bottom: 8px; }
.s-ic { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 12px; pointer-events: none; }
.s-inp { padding-left: 26px !important; }

.main-hdr { padding: 14px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; background: var(--surface); }
.tabs { display: flex; gap: 2px; padding: 14px 22px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; background: var(--surface); }
.tab { display: flex; align-items: center; gap: 5px; padding: 7px 13px; border-radius: var(--r1) var(--r1) 0 0; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text2); border: 1px solid transparent; border-bottom: none; white-space: nowrap; transition: all .15s; }
.tab:hover { color: var(--text1); background: var(--card); }
.tab.act { color: var(--accent); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); margin-bottom: -1px; }

.mscr { flex: 1; overflow-y: auto; padding: 20px 22px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 15px; margin-bottom: 14px; }
.ctitle { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 10px; }

.sch-ed { width: 100%; min-height: 260px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r1); color: #7ee8d6; padding: 13px; font-family: var(--code); font-size: 11px; line-height: 1.8; resize: vertical; outline: none; transition: border-color .15s; }
.sch-ed:focus { border-color: var(--accent); }

.vrow { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.vrow:last-child { border-bottom: none; }
.vic { font-size: 13px; flex-shrink: 0; margin-top: 1px; }

.steps { display: flex; align-items: center; gap: 0; }
.stp { display: flex; align-items: center; }
.sn { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); color: var(--text3); }
.sn.act { background: var(--accent); color: #0D1117; border-color: var(--accent); }
.sn.dn { background: var(--ok-d); color: var(--ok); border-color: var(--ok); }
.sl { font-size: 11px; color: var(--text3); margin-left: 5px; }
.sl.act { color: var(--text1); }
.sc { width: 20px; height: 1px; background: var(--border); margin: 0 3px; }

.toast { position: fixed; bottom: 20px; right: 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); padding: 10px 14px; display: flex; align-items: center; gap: 9px; font-size: 12px; z-index: 1000; animation: su .2s ease; min-width: 220px; }
@keyframes su { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; flex: 1; }
.e-ic { font-size: 36px; margin-bottom: 14px; opacity: .4; }
.e-t { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.e-d { font-size: 13px; color: var(--text2); max-width: 320px; line-height: 1.6; }

.spin { width: 13px; height: 13px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: sp .6s linear infinite; flex-shrink: 0; }
@keyframes sp { to { transform: rotate(360deg); } }

.info { background: var(--blue-d); border: 1px solid rgba(88,166,255,.35); border-radius: var(--r1); padding: 9px 11px; font-size: 11px; color: var(--blue); line-height: 1.6; }
.row { display: flex; align-items: center; gap: 8px; }
.rb { display: flex; align-items: center; justify-content: space-between; }
.f1 { flex: 1; }
.mt8 { margin-top: 8px; }
.mt12 { margin-top: 12px; }
.sdesc { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r1); padding: 9px 13px; margin-bottom: 14px; font-size: 12px; color: var(--text2); line-height: 1.6; }
code { font-family: var(--code); font-size: 10px; background: var(--bg); padding: 1px 5px; border-radius: 4px; color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const ST = [
  { id:"faq",   label:"FAQ",          em:"❓", desc:"Q&A pairs shown directly in Google search results" },
  { id:"art",   label:"Article",      em:"📄", desc:"News, blog posts, and editorial content markup" },
  { id:"how",   label:"How-To",       em:"🛠",  desc:"Step-by-step guides with numbered instructions" },
  { id:"bc",    label:"Breadcrumb",   em:"🔗", desc:"Page hierarchy shown in Google search snippets" },
  { id:"org",   label:"Organization", em:"🏢", desc:"Business name, address, contact & social profiles" },
  { id:"prod",  label:"Product",      em:"🛍", desc:"Product details with price, rating & availability" },
];

const DSITES = [
  { id:"ds1", displayName:"AppsRow Agency Website", shortName:"appsrow" },
  { id:"ds2", displayName:"Client SaaS Platform",   shortName:"saas-demo" },
];

const DPAGES = {
  ds1:[
    { id:"p01", title:"Home",                slug:"/",                        draft:false },
    { id:"p02", title:"About Us",            slug:"/about",                   draft:false },
    { id:"p03", title:"Services",            slug:"/services",                draft:false },
    { id:"p04", title:"Webflow Development", slug:"/services/webflow-dev",    draft:false },
    { id:"p05", title:"UI/UX Design",        slug:"/services/ui-ux-design",   draft:false },
    { id:"p06", title:"Brand Identity",      slug:"/services/brand-identity", draft:false },
    { id:"p07", title:"Blog",                slug:"/blog",                    draft:false },
    { id:"p08", title:"FAQ",                 slug:"/faq",                     draft:false },
    { id:"p09", title:"Contact",             slug:"/contact",                 draft:false },
    { id:"p10", title:"Case Studies",        slug:"/case-studies",            draft:true  },
    { id:"p11", title:"Pricing",             slug:"/pricing",                 draft:false },
  ],
  ds2:[
    { id:"q01", title:"Landing Page", slug:"/",         draft:false },
    { id:"q02", title:"Features",     slug:"/features", draft:false },
    { id:"q03", title:"Pricing",      slug:"/pricing",  draft:false },
    { id:"q04", title:"Docs",         slug:"/docs",     draft:false },
  ],
};

const TMPL = {
  faq:  (t)=>JSON.stringify({"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":`What is ${t}?`,"acceptedAnswer":{"@type":"Answer","text":"Click Generate with AI to populate real answers based on your page content."}},{"@type":"Question","name":`How does ${t} work?`,"acceptedAnswer":{"@type":"Answer","text":"Use the AI generator above to auto-create relevant Q&A pairs for this page."}}]},null,2),
  art:  (t)=>JSON.stringify({"@context":"https://schema.org","@type":"Article","headline":t,"author":{"@type":"Organization","name":"AppsRow"},"datePublished":new Date().toISOString().split("T")[0],"dateModified":new Date().toISOString().split("T")[0],"publisher":{"@type":"Organization","name":"AppsRow","logo":{"@type":"ImageObject","url":"https://appsrow.com/logo.png"}},"description":"Page description here"},null,2),
  how:  (t)=>JSON.stringify({"@context":"https://schema.org","@type":"HowTo","name":t,"description":"Overview of this guide","step":[{"@type":"HowToStep","position":1,"name":"Step One","text":"Description of first step"},{"@type":"HowToStep","position":2,"name":"Step Two","text":"Description of second step"},{"@type":"HowToStep","position":3,"name":"Step Three","text":"Description of third step"}]},null,2),
  bc:   (t,s)=>JSON.stringify({"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://appsrow.com"},{"@type":"ListItem","position":2,"name":t,"item":`https://appsrow.com${s||""}`}]},null,2),
  org:  ()=>JSON.stringify({"@context":"https://schema.org","@type":"Organization","name":"AppsRow Solutions LLP","url":"https://appsrow.com","logo":"https://appsrow.com/logo.png","foundingDate":"2016","description":"Webflow design & development agency specializing in SaaS, AI, and enterprise clients","address":{"@type":"PostalAddress","addressLocality":"Ahmedabad","addressRegion":"Gujarat","addressCountry":"IN"},"sameAs":["https://linkedin.com/company/appsrow","https://twitter.com/appsrow"],"contactPoint":{"@type":"ContactPoint","contactType":"customer support","email":"hello@appsrow.com"}},null,2),
  prod: (t)=>JSON.stringify({"@context":"https://schema.org","@type":"Product","name":t,"description":"Product description here","offers":{"@type":"Offer","priceCurrency":"USD","price":"0","availability":"https://schema.org/InStock","seller":{"@type":"Organization","name":"AppsRow"}}},null,2),
};

function validate(str, type) {
  const r = [];
  let p;
  try { p = JSON.parse(str); r.push({ok:true,msg:"Valid JSON syntax"}); }
  catch(e){ return [{ok:false,msg:"JSON error: "+e.message}]; }
  r.push({ok:!!p["@context"],msg:'@context is present'});
  r.push({ok:!!p["@type"],msg:'@type is defined'});
  if(type==="faq"){ const e=p.mainEntity; r.push({ok:Array.isArray(e)&&e.length>0,msg:"mainEntity has Q&A items"}); if(Array.isArray(e)) r.push({ok:e.every(x=>x.name&&x.acceptedAnswer?.text),msg:"All questions have answers"}); }
  if(type==="art"){ r.push({ok:!!p.headline,msg:"headline present"}); r.push({ok:!!p.author,msg:"author defined"}); r.push({ok:!!p.datePublished,msg:"datePublished set"}); }
  if(type==="how"){ r.push({ok:Array.isArray(p.step)&&p.step.length>0,msg:"step array present with items"}); }
  if(type==="bc"){ r.push({ok:Array.isArray(p.itemListElement),msg:"itemListElement array present"}); }
  if(type==="org"){ r.push({ok:!!p.name,msg:"Organization name set"}); r.push({ok:!!p.url,msg:"URL defined"}); }
  if(type==="prod"){ r.push({ok:!!p.name,msg:"Product name present"}); r.push({ok:!!p.offers,msg:"Offers/pricing defined"}); }
  return r;
}

async function callWebflow(path, key, proxy) {
  const base = proxy || "https://api.webflow.com/v2";
  const r = await fetch(`${base}${path}`, { headers:{"Authorization":`Bearer ${key}`,"Accept-Version":"2.0.0"} });
  if(!r.ok) throw new Error(`Webflow ${r.status}: ${r.statusText}`);
  return r.json();
}

async function injectSchema(pageId, schema, key, proxy) {
  const base = proxy || "https://api.webflow.com/v2";
  const code = `<script type="application/ld+json">\n${schema}\n<\/script>`;
  const r = await fetch(`${base}/pages/${pageId}/custom-code`, {
    method:"PUT",
    headers:{"Authorization":`Bearer ${key}`,"Content-Type":"application/json","Accept-Version":"2.0.0"},
    body: JSON.stringify({ headCode: code })
  });
  if(!r.ok) throw new Error(`Webflow ${r.status}: ${r.statusText}`);
  return true;
}

async function aiGenerate(type, title, slug, ctx, aKey) {
  const map = {faq:"FAQPage with 5+ relevant Q&A pairs",art:"Article with all required metadata",how:"HowTo with 4+ numbered steps",bc:"BreadcrumbList showing page hierarchy",org:"Organization with complete business details",prod:"Product with pricing and availability"};
  const prompt = `Generate a complete valid JSON-LD ${map[type]} schema for this Webflow page:

Page Title: ${title}
URL Slug: ${slug}
Context: ${ctx||"No extra context provided"}

RULES:
- Return ONLY raw JSON-LD, no markdown, no backticks, no explanation
- Must have @context "https://schema.org" and @type
- Make it realistic and SEO-optimised for the page topic
- For FAQ: include 5 genuinely helpful Q&A pairs
- For Article: use today's date
- For HowTo: include 4 clear actionable steps`;

  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":aKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,messages:[{role:"user",content:prompt}]})
  });
  if(!res.ok) throw new Error("AI API error: "+res.status);
  const d = await res.json();
  const txt = d.content?.[0]?.text||"{}";
  return txt.replace(/^```(?:json)?\n?/i,"").replace(/\n?```$/i,"").trim();
}

function Toast({t, onClose}) {
  useEffect(()=>{ if(!t) return; const x=setTimeout(onClose,3800); return()=>clearTimeout(x); },[t]);
  if(!t) return null;
  const col={success:"#3FB950",error:"#F85149",info:"#58A6FF",warning:"#D29922"};
  return <div className="toast"><div className="bdot" style={{background:col[t.type]||col.info}}/><span style={{color:"var(--text1)"}}>{t.msg}</span></div>;
}

function Steps({step}) {
  const ss=["Connect","Select Page","Schema","Inject"];
  return <div className="steps">{ss.map((s,i)=><div key={i} className="stp">{i>0&&<div className="sc" style={{background:i<step?"var(--accent)":"var(--border)"}}/>}<div className={`sn ${i+1===step?"act":i+1<step?"dn":""}`}>{i+1<step?"✓":i+1}</div><span className={`sl ${i+1===step?"act":""}`}>{s}</span></div>)}</div>;
}

function App() {
  const [wKey,setWKey]=useState("");
  const [aKey,setAKey]=useState("");
  const [proxy,setProxy]=useState("");
  const [showProxy,setShowProxy]=useState(false);
  const [conn,setConn]=useState("off"); // off|ing|on|dm
  const [sites,setSites]=useState([]);
  const [site,setSite]=useState(null);
  const [pages,setPages]=useState([]);
  const [page,setPage]=useState(null);
  const [psearch,setPsearch]=useState("");
  const [stype,setStype]=useState("faq");
  const [ctx,setCtx]=useState("");
  const [schema,setSchema]=useState("");
  const [isGen,setIsGen]=useState(false);
  const [isInj,setIsInj]=useState(false);
  const [isLP,setIsLP]=useState(false);
  const [valid,setValid]=useState(null);
  const [injd,setInjd]=useState(new Set());
  const [toast,setToast]=useState(null);

  const tk = (msg,type="info") => setToast({msg,type});
  const step = conn==="off"?1:!page?2:!schema?3:4;

  const doConnect = async()=>{
    if(!wKey.trim()){tk("Enter your Webflow API key","error");return;}
    setConn("ing");
    try {
      const d = await callWebflow("/sites",wKey,proxy);
      setSites(d.sites||[]);
      setConn("on");
      tk(`Connected! Found ${(d.sites||[]).length} site(s)`,"success");
    } catch(e){
      setConn("off");
      const msg = e.message.includes("Failed to fetch")||e.message.includes("CORS")
        ? "CORS blocked – set a Proxy URL below, or use Demo Mode" : e.message;
      tk(msg,"error");
    }
  };

  const doDemo=()=>{ setSites(DSITES); setConn("dm"); tk("Demo mode – using sample Webflow data","info"); };

  const doPickSite=async(s)=>{
    setSite(s); setPage(null); setSchema(""); setValid(null); setIsLP(true);
    try {
      if(conn==="dm"){
        await new Promise(r=>setTimeout(r,500));
        setPages(DPAGES[s.id]||[]);
      } else {
        const d = await callWebflow(`/sites/${s.id}/pages`,wKey,proxy);
        setPages((d.pages||[]).map(p=>({id:p.id,title:p.title,slug:p.slug,draft:p.draft})));
      }
    } catch(e){ tk(e.message,"error"); }
    setIsLP(false);
  };

  const doPickPage=(p)=>{
    setPage(p); setSchema(""); setValid(null);
    const fn=TMPL[stype]; if(fn) setSchema(fn(p.title,p.slug));
    tk(`Selected: ${p.title}`,"info");
  };

  const doType=(t)=>{
    setStype(t); setValid(null);
    if(page){ const fn=TMPL[t]; if(fn) setSchema(fn(page.title,page.slug)); }
  };

  const doGenerate=async()=>{
    if(!page){tk("Select a page first","error");return;}
    setIsGen(true);
    try {
      let res;
      if(!aKey.trim()||conn==="dm"){
        await new Promise(r=>setTimeout(r,800));
        const fn=TMPL[stype]; res=fn?fn(page.title,page.slug):"{}";
      } else {
        res = await aiGenerate(stype,page.title,page.slug,ctx,aKey);
      }
      try{ res=JSON.stringify(JSON.parse(res),null,2); }catch{}
      setSchema(res);
      const v=validate(res,stype); setValid(v);
      const all=v.every(c=>c.ok);
      tk(all?"Schema generated & validated ✓":"Schema generated – review warnings below",all?"success":"warning");
    } catch(e){ tk("Generation failed: "+e.message,"error"); }
    setIsGen(false);
  };

  const doValidate=()=>{
    if(!schema.trim()){tk("No schema to validate","error");return;}
    const v=validate(schema,stype); setValid(v);
    tk(v.every(c=>c.ok)?"All checks passed!":"Issues found – review below",v.every(c=>c.ok)?"success":"warning");
  };

  const doFormat=()=>{
    try{ setSchema(JSON.stringify(JSON.parse(schema),null,2)); tk("Formatted","success"); }
    catch{ tk("Invalid JSON – cannot format","error"); }
  };

  const doCopy=()=>{ navigator.clipboard?.writeText(schema); tk("Copied to clipboard","success"); };

  const doInject=async()=>{
    if(!page||!schema.trim()){tk("Generate a schema first","error");return;}
    if(conn==="dm"){
      setIsInj(true);
      await new Promise(r=>setTimeout(r,800));
      setInjd(prev=>new Set([...prev,page.id]));
      tk(`Schema injected to "${page.title}" (Demo)`, "success");
      setIsInj(false);
      return;
    }
    if(!wKey.trim()){tk("Webflow API key required","error");return;}
    setIsInj(true);
    try {
      await injectSchema(page.id,schema,wKey,proxy);
      setInjd(prev=>new Set([...prev,page.id]));
      tk(`Schema injected to "${page.title}"!`,"success");
    } catch(e){ tk("Inject failed: "+e.message,"error"); }
    setIsInj(false);
  };

  const fp=pages.filter(p=>p.title.toLowerCase().includes(psearch.toLowerCase())||(p.slug||"").toLowerCase().includes(psearch.toLowerCase()));
  const aST=ST.find(t=>t.id===stype);

  return (
    <div className="app">
      {/* Header */}
      <div className="hdr">
        <div className="logo">
          <div className="logo-ic">SF</div>
          <div className="logo-tx">Schema<span>Flow</span> <span style={{fontWeight:400,fontSize:12,color:"var(--text2)"}}>AI for Webflow</span></div>
        </div>
        <div className="row" style={{gap:10}}>
          <Steps step={step}/>
          <div style={{width:1,height:18,background:"var(--border)",margin:"0 6px"}}/>
          {conn==="on"&&<span className="badge b-ok"><span className="bdot" style={{background:"var(--ok)"}}/>Connected</span>}
          {conn==="dm"&&<span className="badge b-dm"><span className="bdot" style={{background:"var(--blue)"}}/>Demo Mode</span>}
          {conn==="off"&&<span className="badge b-no"><span className="bdot" style={{background:"var(--err)"}}/>Not Connected</span>}
          {conn==="ing"&&<span className="badge" style={{background:"var(--warn-d)",color:"var(--warn)",border:"1px solid var(--warn)"}}><div className="spin"/>Connecting</span>}
        </div>
      </div>

      <div className="bdy">
        {/* Sidebar */}
        <div className="sbar">
          {/* API Config */}
          <div className="sec">
            <div className="sec-lbl">API Configuration</div>
            <div className="inp-g">
              <label className="inp-lbl">Webflow API Key</label>
              <input className="inp inp-c" type="password" placeholder="Bearer token..." value={wKey} onChange={e=>setWKey(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doConnect()}/>
            </div>
            <div className="inp-g">
              <label className="inp-lbl">Anthropic API Key <span style={{color:"var(--text3)"}}>(for AI generation)</span></label>
              <input className="inp inp-c" type="password" placeholder="sk-ant-..." value={aKey} onChange={e=>setAKey(e.target.value)}/>
            </div>
            <div style={{marginBottom:10}}>
              <button onClick={()=>setShowProxy(!showProxy)} style={{background:"none",border:"none",cursor:"pointer",padding:0,color:"var(--accent)",fontSize:11,fontFamily:"var(--ui)"}}>
                {showProxy?"▼":"▶"} Proxy URL <span style={{color:"var(--text3)"}}>(CORS fix)</span>
              </button>
              {showProxy&&<input className="inp mt8" style={{marginTop:6}} placeholder="https://your-app.com/api/wf-proxy" value={proxy} onChange={e=>setProxy(e.target.value)}/>}
            </div>
            <div className="row" style={{gap:7}}>
              <button className="btn btn-p f1" onClick={doConnect} disabled={conn==="ing"||!wKey.trim()}>
                {conn==="ing"?<><div className="spin"/>Connecting</>:"⚡ Connect Webflow"}
              </button>
              <button className="btn btn-o" onClick={doDemo} title="Try with demo data" style={{flexShrink:0}}>Demo</button>
            </div>
            {conn==="off"&&<div className="info mt8">💡 Webflow API has CORS restrictions in-browser. Use a Next.js proxy route or click <strong>Demo</strong> to explore the UI now.</div>}
          </div>

          {/* Sites */}
          {(conn==="on"||conn==="dm")&&(
            <div className="sec" style={{flexShrink:0}}>
              <div className="sec-lbl">Sites ({sites.length})</div>
              {sites.map(s=>(
                <div key={s.id} className={`li ${site?.id===s.id?"act":""}`} onClick={()=>doPickSite(s)}>
                  <span className="li-ic">🌐</span>
                  <div className="f1" style={{minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.displayName||s.shortName}</div>
                    <div className="slug">{s.shortName}</div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Pages */}
          {site&&(
            <div className="sec">
              <div className="sec-lbl">Pages {pages.length>0&&`(${pages.length})`}</div>
              <div className="sw">
                <span className="s-ic">🔍</span>
                <input className="inp s-inp" placeholder="Search pages..." value={psearch} onChange={e=>setPsearch(e.target.value)}/>
              </div>
              <div className="ls">
                {isLP?(
                  <div className="row" style={{padding:"10px 8px",color:"var(--text2)",fontSize:12}}><div className="spin"/>Loading pages…</div>
                ):fp.length===0?(
                  <div style={{padding:"8px 8px",fontSize:12,color:"var(--text3)"}}>No pages found</div>
                ):fp.map(p=>(
                  <div key={p.id} className={`li ${page?.id===p.id?"act":""}`} onClick={()=>doPickPage(p)}>
                    <span className="li-ic">{p.slug==="/"?"🏠":"📄"}</span>
                    <div className="f1" style={{minWidth:0}}>
                      <div className="row" style={{gap:4,flexWrap:"wrap"}}>
                        <span style={{fontWeight:600,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.title}</span>
                        {p.draft&&<span className="tag tag-draft">draft</span>}
                        {injd.has(p.id)&&<span className="tag tag-ok">✓ schema</span>}
                      </div>
                      <div className="slug">{p.slug}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* Main */}
        <div className="main">
          {!page?(
            <div className="empty">
              <div className="e-ic">⚡</div>
              <div className="e-t">
                {conn==="off"?"Connect Webflow to get started":!site?"Select a site from the sidebar":"Select a page to add schema markup"}
              </div>
              <div className="e-d">
                {conn==="off"?"Enter your API keys and click Connect, or use Demo Mode to explore the UI"
                  :!site?"Click any Webflow site on the left to view its pages"
                  :"Pick any page from the list — we'll generate structured data for it with AI"}
              </div>
            </div>
          ):(
            <>
              {/* Page header */}
              <div className="main-hdr">
                <span style={{fontSize:18}}>{page.slug==="/"?"🏠":"📄"}</span>
                <div className="f1">
                  <div style={{fontWeight:700,fontSize:14}}>{page.title}</div>
                  <div className="slug" style={{fontSize:11}}>{site?.shortName}{page.slug}</div>
                </div>
                {injd.has(page.id)&&<span className="badge b-ok"><span className="bdot" style={{background:"var(--ok)"}}/>Schema Live</span>}
                <a href="https://validator.schema.org/" target="_blank" rel="noopener" className="btn btn-o btn-sm" style={{textDecoration:"none"}}>Rich Results Test ↗</a>
              </div>

              {/* Schema type tabs */}
              <div className="tabs">
                {ST.map(t=>(
                  <div key={t.id} className={`tab ${stype===t.id?"act":""}`} onClick={()=>doType(t.id)}>
                    <span style={{fontSize:13}}>{t.em}</span>{t.label}
                  </div>
                ))}
              </div>

              {/* Scrollable content */}
              <div className="mscr">
                <div className="sdesc">
                  <strong style={{color:"var(--text1)"}}>{aST?.em} {aST?.label} Schema</strong>
                  {" — "}{aST?.desc}
                </div>

                {/* AI Generator */}
                <div className="card">
                  <div className="rb" style={{marginBottom:10}}>
                    <div className="ctitle" style={{margin:0}}>AI Schema Generator</div>
                    {!aKey&&conn!=="dm"&&<span style={{fontSize:10,color:"var(--warn)"}}>⚠ Add Anthropic key for AI generation</span>}
                  </div>
                  <textarea
                    className="inp"
                    style={{minHeight:72,resize:"vertical",fontFamily:"var(--ui)",lineHeight:1.6,fontSize:12}}
                    placeholder={`Describe this page or paste its key content...\n\nExample: "FAQ page answering questions about our Webflow development services, pricing, timelines, and support."`}
                    value={ctx}
                    onChange={e=>setCtx(e.target.value)}
                  />
                  <div className="row mt8" style={{justifyContent:"flex-end"}}>
                    <button className="btn btn-p" onClick={doGenerate} disabled={isGen}>
                      {isGen?<><div className="spin"/>Generating…</>:"✨ Generate with AI"}
                    </button>
                  </div>
                  {!aKey&&conn!=="dm"&&(
                    <div className="info mt8">Without an Anthropic API key, a template schema will be inserted. Add your key for AI-powered, context-aware generation.</div>
                  )}
                </div>

                {/* Schema Editor */}
                <div className="card">
                  <div className="rb" style={{marginBottom:10}}>
                    <div className="ctitle" style={{margin:0}}>JSON-LD Editor</div>
                    <div className="row" style={{gap:5}}>
                      <button className="btn btn-o btn-sm" onClick={doFormat}>Format</button>
                      <button className="btn btn-o btn-sm" onClick={doValidate}>Validate</button>
                      <button className="btn btn-o btn-sm" onClick={doCopy}>Copy</button>
                    </div>
                  </div>
                  <textarea className="sch-ed" value={schema} onChange={e=>{setSchema(e.target.value);setValid(null);}} spellCheck={false}/>
                </div>

                {/* Validation */}
                {valid&&(
                  <div className="card">
                    <div className="ctitle">Validation Results</div>
                    {valid.map((v,i)=>(
                      <div key={i} className="vrow">
                        <span className="vic" style={{color:v.ok?"var(--ok)":"var(--err)"}}>{v.ok?"✓":"✗"}</span>
                        <span style={{color:v.ok?"var(--text1)":"var(--err)",fontSize:12}}>{v.msg}</span>
                      </div>
                    ))}
                    <div className="mt8" style={{fontSize:11,color:valid.every(v=>v.ok)?"var(--ok)":"var(--warn)"}}>
                      {valid.every(v=>v.ok)?"✓ All checks passed – ready to inject":`${valid.filter(v=>!v.ok).length} issue(s) found – fix before injecting`}
                    </div>
                  </div>
                )}

                {/* Inject */}
                <div className="card" style={{background:"var(--surface)"}}>
                  <div className="rb">
                    <div>
                      <div style={{fontWeight:700,marginBottom:4,fontSize:13}}>Inject to Webflow Page Head</div>
                      <div style={{fontSize:11,color:"var(--text2)"}}>Adds <code>&lt;script type="application/ld+json"&gt;</code> to the page's &lt;head&gt;</div>
                    </div>
                    <button className="btn btn-p" style={{minWidth:130}} onClick={doInject} disabled={isInj||!schema.trim()}>
                      {isInj?<><div className="spin"/>Injecting…</>:injd.has(page.id)?"↻ Re-inject":"⚡ Inject Schema"}
                    </button>
                  </div>
                  {injd.has(page.id)&&<div className="info mt12" style={{background:"var(--ok-d)",borderColor:"rgba(63,185,80,.35)",color:"var(--ok)"}}>✓ Schema injected! Publish your Webflow site to make changes live, then verify with Google's Rich Results Test.</div>}
                  {!injd.has(page.id)&&conn!=="dm"&&<div className="info mt12">After injecting, publish your Webflow site. Use <a href="https://search.google.com/test/rich-results" target="_blank" rel="noopener" style={{color:"var(--blue)"}}>Google Rich Results Test</a> to verify the schema is working correctly.</div>}
                </div>

                {/* Schema preview as script tag */}
                {schema&&(
                  <div className="card">
                    <div className="ctitle">Generated Script Tag (Page Head)</div>
                    <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--r1)",padding:"13px",fontFamily:"var(--code)",fontSize:10,color:"var(--text2)",lineHeight:1.7,overflowX:"auto"}}>
                      <span style={{color:"#f0883e"}}>&lt;script</span>
                      <span style={{color:"#79c0ff"}}> type</span>
                      <span style={{color:"#a5d6ff"}}>="application/ld+json"</span>
                      <span style={{color:"#f0883e"}}>&gt;</span>
                      <br/>
                      <span style={{color:"#7ee8d6"}}>{schema.split("\n").map((l,i)=><span key={i}>{l}<br/></span>)}</span>
                      <span style={{color:"#f0883e"}}>&lt;/script&gt;</span>
                    </div>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      </div>

      <Toast t={toast} onClose={()=>setToast(null)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
